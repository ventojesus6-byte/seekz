<!-- Reemplaza tus estilos actuales por estos -->
<style>
/* Estilos base (Para pantallas de computadora/PC) */
.btn-whatsapp {
    position: fixed;
    width: 60px;
    height: 60px;
    bottom: 30px;
    right: 30px;
    background-color: #25d366;
    color: #FFF;
    border-radius: 50%;
    text-align: center;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    z-index: 1000;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
}

/* Cambia el tamaño del icono SVG en PC */
.btn-whatsapp svg {
    width: 30px;
    height: 30px;
}

.btn-whatsapp:hover {
    background-color: #128C7E;
    transform: scale(1.1);
}

/* --- ADAPTACIÓN PARA MÓVILES --- */
@media (max-width: 768px) {
    .btn-whatsapp {
        width: 48px;        /* Reducimos el círculo contenedor */
        height: 48px;
        bottom: 20px;       /* Lo acercamos un poco más al borde inferior */
        right: 20px;        /* Lo acercamos un poco más al borde derecho */
    }
    
    .btn-whatsapp svg {
        width: 24px;        /* Reducimos el logotipo de WhatsApp interno */
        height: 24px;
    }
}

@media (max-width: 500px) {
    .btn-whatsapp {
        width: 18px;        /* Reducimos el círculo contenedor */
        height: 18px;
        bottom: 10px;       /* Lo acercamos un poco más al borde inferior */
        right: 10px;        /* Lo acercamos un poco más al borde derecho */
    }
    
    .btn-whatsapp svg {
        width: 24px;        /* Reducimos el logotipo de WhatsApp interno */
        height: 24px;
    }
}
</style>
